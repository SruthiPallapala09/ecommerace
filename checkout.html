<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Checkout Page</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<section style="padding:20px;">
  <h2>Your Order</h2>
  <div id="items"></div>
  <h3 id="total"></h3>

  <h2>Billing Details</h2>
  <form onsubmit="placeOrder(event)">
    <input type="text" placeholder="Full Name" required><br><br>
    <input type="text" placeholder="Address" required><br><br>
    <input type="text" placeholder="City" required><br><br>
    <input type="text" placeholder="Pincode" required><br><br>
    <button type="submit">Place Order</button>
  </form>
</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCheckout() {
  let itemsDiv = document.getElementById("items");
  let total = 0;

  itemsDiv.innerHTML = "";

  cart.forEach(item => {
    let p = document.createElement("p");
    p.innerText = item.name + " - ₹" + item.price;
    itemsDiv.appendChild(p);
    total += item.price;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

function placeOrder(e) {
  e.preventDefault();
  alert("Order Placed Successfully!");
  localStorage.removeItem("cart");
  window.location.href = "index.html";
}

loadCheckout();
</script>

</body>
</html>
