<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Checkout</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
    </nav>
  </header>

  <section class="checkout">
    <h2>Billing Details</h2>
    <form onsubmit="placeOrder(event)">
      <input type="text" placeholder="Full Name" required><br><br>
      <input type="text" placeholder="Address" required><br><br>
      <input type="text" placeholder="City" required><br><br>
      <input type="text" placeholder="Pincode" required><br><br>
      <input type="text" placeholder="Card Number" required><br><br>
      <button type="submit">Place Order</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
